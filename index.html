<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Root</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="container site-nav">
          <div class="site-logo">
            <a href="./index.html">
              <img src="./imgs/png/site-logo.svg" alt="site logo" />
            </a>
          </div>
          <div class="navbar">
            <div class="site-links">
              <a href="#">Home</a>
              <a href="#">Celebrate</a>
              <a href="#">Gifts</a>
              <a href="#">New</a>
            </div>
            <button><img src="./imgs/png/moon.svg" alt="" /></button>
            <button>
              <img
                class="menu-bar"
                src="./imgs/png/menu-bar-black.svg"
                alt="menu bar"
              />
            </button>
          </div>
        </div>
      </nav>
      <section class="hero">
        <div class="container hero-wrap">
          <div class="hero-img">
            <img src="./imgs/png/home.svg" alt="christmas" />
          </div>

          <div class="hero-text">
            <h1>
              Merry Christmas and <br />
              Happy New Year!
            </h1>

            <p>
              Christmas and a new year is about to begin, all good wishes and
              successes.
            </p>

            <button class="hero-btn">Get Started</button>
          </div>
        </div>
      </section>
    </header>
  </body>
</html>
